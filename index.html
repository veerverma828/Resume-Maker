<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResumeCraft - Premium Resume Maker</title>
    <script type="text/javascript">
      (function() {
        const redirectPath = sessionStorage.getItem('redirect_path');
        if (redirectPath) {
          sessionStorage.removeItem('redirect_path');
          window.history.replaceState(null, null, redirectPath);
        }
      })();
    </script>
    <!-- Prevent initial white flash by immediately setting theme attribute and background colors -->
    <script type="text/javascript">
      (function() {
        const theme = localStorage.getItem('resumemaker_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <style>
      html, body {
        background-color: #090d16; /* Default dark background matching --bg-app */
      }
      html[data-theme="light"], html[data-theme="light"] body {
        background-color: #f8fafc; /* Default light background matching --bg-app */
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
